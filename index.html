<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Deep Space</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div>

<div class="container" id="scene">
  <img id="rocket" src="rocket.png" alt="Rocket" onclick="spin()">
  <h1 id="headline">∞</h1>
  <p id="tagline">somewhere in the universe</p>
  <button>Engage Warp Drive</button>
</div>

<!-- Custom context menu -->
<div id="ctx-menu">
  <div onclick="ctxEject()">⏏ Eject Pilot</div>
  <div onclick="ctxRefuel()">⛽ Refuel</div>
  <div onclick="document.getElementById('ctx-menu').classList.remove('open')">✕ Cancel</div>
</div>

<div id="hyperspace-overlay">
  <canvas id="hyperspace-canvas"></canvas>
  <div id="hyperspace-text">
    <span class="hs-title">HYPERSPACE</span>
    <span class="hs-sub">jump drive engaged</span>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
